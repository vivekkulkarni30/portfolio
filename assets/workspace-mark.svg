<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960" role="img" aria-labelledby="title desc">
  <title id="title">Abstract developer workspace mark</title>
  <desc id="desc">A dark editor-inspired geometric workspace with blue highlights.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#252526"/>
      <stop offset="1" stop-color="#111315"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#007ACC"/>
      <stop offset="1" stop-color="#4EC9B0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="960" height="960" rx="64" fill="url(#bg)"/>
  <path d="M0 220h960" stroke="#3C3C3C" stroke-width="2"/>
  <circle cx="92" cy="104" r="16" fill="#FF5F57"/>
  <circle cx="146" cy="104" r="16" fill="#FEBC2E"/>
  <circle cx="200" cy="104" r="16" fill="#28C840"/>
  <rect x="282" y="75" width="402" height="58" rx="14" fill="#1E1E1E" stroke="#3C3C3C"/>
  <rect x="68" y="266" width="166" height="568" rx="22" fill="#252526" stroke="#3C3C3C"/>
  <rect x="280" y="266" width="612" height="568" rx="22" fill="#1E1E1E" stroke="#3C3C3C"/>
  <rect x="320" y="316" width="228" height="22" rx="11" fill="#569CD6"/>
  <rect x="320" y="370" width="434" height="16" rx="8" fill="#3C3C3C"/>
  <rect x="358" y="418" width="290" height="16" rx="8" fill="#CE9178"/>
  <rect x="358" y="466" width="390" height="16" rx="8" fill="#4EC9B0"/>
  <rect x="358" y="514" width="250" height="16" rx="8" fill="#C586C0"/>
  <rect x="320" y="588" width="520" height="170" rx="22" fill="#252526" stroke="#3C3C3C"/>
  <path d="M112 338h78M112 394h52M112 450h86M112 506h64M112 562h96" stroke="#858585" stroke-width="18" stroke-linecap="round"/>
  <circle cx="676" cy="500" r="128" fill="#007ACC" opacity=".14" filter="url(#glow)"/>
  <path d="m680 360 132 74v148l-132 78-132-78V434l132-74Z" fill="url(#blue)" opacity=".88"/>
  <path d="m680 420 78 44v88l-78 46-78-46v-88l78-44Z" fill="#1E1E1E" opacity=".9"/>
