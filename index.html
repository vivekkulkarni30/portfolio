<!doctype html>
 <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A VS Code-inspired personal portfolio for a software engineer, educator, entrepreneur, and creator."
    />
    <meta name="theme-color" content="#1e1e1e" />
    <meta property="og:title" content="Vivek Kulkarni | Developer Workspace" />
    <meta
      property="og:description"
      content="Explore projects, platforms, products, courses, articles, and contact details inside a premium developer workspace."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Vivek Kulkarni - Visual Studio Code Portfolio</title>
    <link rel="icon" href="assets/workspace-mark.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Vivek Kulkarni",
        "jobTitle": "Software Engineer, Educator, Entrepreneur, Content Creator",
        "url": "https://example.com",
        "sameAs": [
          "https://github.com/",
          "https://linkedin.com/",
          "https://youtube.com/"
        ]
      }
    </script>
  </head>
  <body>
    <a class="skip-link" href="#editor">Skip to portfolio content</a>

    <div class="workspace" id="app">
      <header class="titlebar" aria-label="Portfolio navigation">
        <div class="window-cluster" aria-hidden="true">
          <span class="control close"></span>
          <span class="control minimize"></span>
          <span class="control maximize"></span>
        </div>
        <div class="app-menu" aria-hidden="true">
          <span>File</span>
          <span>Edit</span>
          <span>Terminal</span>
          <span>Help</span>
        </div>
        <div class="window-title">vivek.kulkarni - Visual Studio Code</div>
        <button class="mobile-rail-toggle" type="button" aria-label="Toggle sidebar" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
        <nav class="top-tabs" id="topTabs" aria-label="Open portfolio files"></nav>
        <button class="command-bar" type="button" id="commandButton" aria-label="Open command palette">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10.8 17.6a6.8 6.8 0 1 1 4.8-2l4 4-1.5 1.5-4-4a6.8 6.8 0 0 1-3.3.5Zm0-2.1a4.7 4.7 0 1 0 0-9.4 4.7 4.7 0 0 0 0 9.4Z" />
          </svg>
          <span>portfolio.commandPalette</span>
          <kbd>Cmd K</kbd>
        </button>
      </header>

      <div class="shell">
        <aside class="activity-bar" aria-label="Primary sections">
          <button class="rail-collapse" id="railCollapse" type="button" aria-label="Collapse explorer">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.4 6 9.4 12l6 6-1.4 1.4L6.6 12 14 4.6 15.4 6Z" /></svg>
          </button>
          <div class="activity-icons" id="activityIcons"></div>
        </aside>

        <aside class="explorer" id="explorer" aria-label="Portfolio explorer">
          <div class="explorer-head">
            <span>EXPLORER</span>
            <button type="button" id="explorerClose" aria-label="Close explorer">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 10.6 4.6-4.6L18 7.4 13.4 12l4.6 4.6-1.4 1.4-4.6-4.6L7.4 18 6 16.6l4.6-4.6L6 7.4 7.4 6l4.6 4.6Z" /></svg>
            </button>
          </div>
          <div class="folder open">
            <button class="folder-row" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6.5A2.5 2.5 0 0 1 5.5 4H10l2 2h6.5A2.5 2.5 0 0 1 21 8.5v9A2.5 2.5 0 0 1 18.5 20h-13A2.5 2.5 0 0 1 3 17.5v-11Zm2.5-.5a.5.5 0 0 0-.5.5v11a.5.5 0 0 0 .5.5h13a.5.5 0 0 0 .5-.5v-9a.5.5 0 0 0-.5-.5h-7.3l-2-2H5.5Z" /></svg>
              <span>vivek-portfolio</span>
            </button>
            <div class="file-tree" id="fileTree"></div>
          </div>
          <div class="source-control">
            <div class="source-title">SOURCE CONTROL</div>
            <div class="commit-card">
              <span class="status-dot"></span>
              <div>
                <strong>main</strong>
                <span>7 sections staged for review</span>
              </div>
            </div>
          </div>
        </aside>

        <main class="editor" id="editor">
          <div class="editor-tabs" id="editorTabs" aria-label="Editor tabs"></div>
          <div class="breadcrumb" id="breadcrumb"></div>
          <section class="editor-surface" id="contentHost"></section>
        </main>
      </div>

      <section class="terminal" id="terminal" aria-label="Integrated terminal">
        <div class="terminal-tabs">
          <button class="active" type="button">terminal</button>
          <button type="button">problems</button>
          <button type="button">output</button>
        </div>
        <div class="terminal-window">
          <div class="terminal-line"><span class="prompt">vivek@portfolio</span><span class="path"> ~/workspace</span> <span id="terminalType"></span><span class="cursor"></span></div>
          <div class="terminal-log" id="terminalLog"></div>
        </div>
      </section>

      <footer class="statusbar" aria-label="Workspace status">
        <div>
          <span>main</span>
          <span>sync ready</span>
          <span>UTF-8</span>
        </div>
        <div>
          <span>TypeScript</span>
          <span>Ln 1, Col 1</span>
          <span>Prettier</span>
        </div>
      </footer>
    </div>

    <div class="palette" id="palette" aria-hidden="true">
      <div class="palette-panel" role="dialog" aria-modal="true" aria-labelledby="paletteTitle">
        <label class="palette-search" for="paletteInput">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10.8 17.6a6.8 6.8 0 1 1 4.8-2l4 4-1.5 1.5-4-4a6.8 6.8 0 0 1-3.3.5Zm0-2.1a4.7 4.7 0 1 0 0-9.4 4.7 4.7 0 0 0 0 9.4Z" />
          </svg>
          <input id="paletteInput" type="search" placeholder="Go to file or section..." autocomplete="off" />
        </label>
        <h2 id="paletteTitle">Command Palette</h2>
        <div class="palette-results" id="paletteResults"></div>
      </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
